server:
  op_port: 9005
  rp_port: 9006
  # Issuer URL for the OP. Use ${BASE_URL} to template from environment.
  issuer: "http://localhost:9005"
  # Scopes advertised in discovery. Includes OID4VCI credential scopes.
  scopes_supported:
    - openid
    - profile
    - email
    - pid
    - pid_1_5
    - pid_1_8

# Static OIDC clients. Supports ${var} templating from environment variables.
clients:
  - client_id: "mini-oidc-rp"
    client_name: "Built-in Relying Party"
    redirect_uris:
      - "http://localhost:9006/callback"
    token_endpoint_auth_method: "none"

  - client_id: "apigw-oidc-client"
    client_name: "VC API Gateway"
    client_secret: "test-secret"
    redirect_uris:
      - "http://localhost:8091/oidcrp/callback"
      - "http://192.168.240.1:8091/oidcrp/callback"
    token_endpoint_auth_method: "client_secret_basic"

rp:
  base_url: "http://localhost:9006"
  client_id: "mini-oidc-rp"
  op_issuer: "http://localhost:9005"
