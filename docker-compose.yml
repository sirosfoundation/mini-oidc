services:
  mini-oidc-op:
    image: ghcr.io/sirosfoundation/mini-oidc:${MINI_OIDC_VERSION:-main}
    container_name: mini-oidc-op
    command: ["/usr/local/bin/op"]
    ports:
      - "9005:9005"
    environment:
      - CONFIG_FILE=/etc/mini-oidc/configs/config.production.yaml
      - USERS_FILE=/etc/mini-oidc/users.yaml
      - ISSUER=${MINI_OIDC_ISSUER:-http://mini-oidc-op:9005}
      - RP_BASE_URL=${MINI_OIDC_RP_URL:-http://localhost:9006}
      - CLIENT_ID=${MINI_OIDC_CLIENT_ID:-mini-oidc-rp}
    networks:
      - mini-oidc

  mini-oidc-rp:
    image: ghcr.io/sirosfoundation/mini-oidc:${MINI_OIDC_VERSION:-main}
    container_name: mini-oidc-rp
    command: ["/usr/local/bin/rp"]
    ports:
      - "9006:9006"
    environment:
      - CONFIG_FILE=/etc/mini-oidc/configs/config.production.yaml
      - ISSUER=${MINI_OIDC_ISSUER:-http://mini-oidc-op:9005}
      - RP_BASE_URL=${MINI_OIDC_RP_URL:-http://localhost:9006}
      - CLIENT_ID=${MINI_OIDC_CLIENT_ID:-mini-oidc-rp}
    depends_on:
      - mini-oidc-op
    networks:
      - mini-oidc

networks:
  mini-oidc:
    driver: bridge
