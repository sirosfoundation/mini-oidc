# Docker Compose overlay for sirosid-dev integration.
# Usage from sirosid-dev: docker compose -f ... -f ../mini-oidc/docker-compose.sirosid.yml up
# Uses published ghcr.io image — no local build needed.
services:
  mini-oidc-op:
    image: ghcr.io/sirosfoundation/mini-oidc:${MINI_OIDC_VERSION:-main}
    container_name: mini-oidc-e2e
    command: ["/usr/local/bin/op"]
    ports:
      - "9005:9005"
    environment:
      - CONFIG_FILE=/etc/mini-oidc/configs/config.production.yaml
      - USERS_FILE=/etc/mini-oidc/users.yaml
      - ISSUER=${MINI_OIDC_ISSUER:-http://mini-oidc-op:9005}
      - RP_BASE_URL=${MINI_OIDC_RP_URL:-http://mini-oidc-rp:9006}
      - CLIENT_ID=${MINI_OIDC_CLIENT_ID:-mini-oidc-rp}
      - APIGW_CLIENT_ID=${APIGW_CLIENT_ID:-apigw-oidc-client}
      - APIGW_CLIENT_SECRET=${APIGW_CLIENT_SECRET:-test-secret}
      - APIGW_REDIRECT_URI=${APIGW_REDIRECT_URI:-http://vc-apigw:8091/oidcrp/callback}
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck", "9005"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 2s
    networks:
      - e2e-test-network

  mini-oidc-rp:
    image: ghcr.io/sirosfoundation/mini-oidc:${MINI_OIDC_VERSION:-main}
    container_name: mini-oidc-rp-e2e
    command: ["/usr/local/bin/rp"]
    ports:
      - "9006:9006"
    environment:
      - CONFIG_FILE=/etc/mini-oidc/configs/config.production.yaml
      - ISSUER=${MINI_OIDC_ISSUER:-http://mini-oidc-op:9005}
      - RP_BASE_URL=${MINI_OIDC_RP_URL:-http://mini-oidc-rp:9006}
      - CLIENT_ID=${MINI_OIDC_CLIENT_ID:-mini-oidc-rp}
    depends_on:
      mini-oidc-op:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck", "9006"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 2s
    networks:
      - e2e-test-network

networks:
  e2e-test-network:
    external: true
